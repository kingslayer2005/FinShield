
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: finshield-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: finshield-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    restart: on-failure

  postgres:
    image: postgres:15
    container_name: finshield-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: finshield
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: finshield123

  redis:
    image: redis:alpine
    container_name: finshield-redis
    ports:
      - "6379:6379"

  mlflow:
    image: python:3.11-slim
    container_name: finshield-mlflow
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000"

  grafana:
    image: grafana/grafana:latest
    container_name: finshield-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: finshield123